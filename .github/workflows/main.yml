name: build dtrade-user-authentication-backend and deply on DockerHub 

on:
  push:
    branched:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    -name: Checkout Code
    uses: actions/checkout@v4

    -name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: 18
    
    -name: installing dependencies
    run: npm ci

    -name: Running tests
    run: npm test

    -name: setting up Docker build
    uses: docker/setup-buildx-action@v3

    -name: logging in DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{secerets.DOCKER_USERNAME}}
      password: ${{secerets.DOCKER_ACCESS_TOKEN}}
    
    -name: Building and pushing docker image
    uses: docker/build-push-action@v5
    with:
    context: .
    push: true
    tags: dbhavsar214/dtrade-user-authentication-backend:latest
